<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080C12;font-family:Inter,system-ui,sans-serif;color:#F5F7FA;min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}
.nav{display:flex;flex-wrap:wrap;gap:2px;padding:12px 20px;background:rgba(8,12,18,0.98);border-bottom:0.5px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:10}
.nb{padding:5px 12px;font-size:11px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:500;background:transparent;color:rgba(255,255,255,0.35);transition:all .2s}
.nb:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05)}
.nb.on{background:rgba(212,168,67,0.15);color:#D4A843}
.slide{flex:1;padding:36px 44px;display:flex;flex-direction:column;justify-content:center}
.footer{display:flex;justify-content:space-between;align-items:center;padding:12px 44px;border-top:0.5px solid rgba(255,255,255,0.07);background:rgba(8,12,18,0.98)}
.fb{padding:7px 20px;background:transparent;border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(255,255,255,0.4);cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.fb:hover:not([disabled]){border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.8)}
.fb[disabled]{opacity:0.2;cursor:not-allowed}
.pg{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:1px}
.card{background:rgba(255,255,255,0.035);border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px 22px}
.label{font-size:10px;color:#D4A843;letter-spacing:3.5px;text-transform:uppercase;font-weight:600;opacity:.85;margin-bottom:10px}
.title{font-size:28px;font-weight:700;color:#F5F7FA;line-height:1.2;letter-spacing:-.5px;margin-bottom:4px}
.sub{font-size:13px;color:#7A8A9A;line-height:1.75;margin-top:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.g5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px}
.metric{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:18px 14px;text-align:center}
.bar{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin:10px 0 14px}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,0.05)}
.divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,#D4A843,transparent);margin:14px auto}
@media(max-width:680px){
  .slide{padding:20px 16px}.footer{padding:12px 16px}.nav{padding:10px 12px;gap:1px}
  .nb{padding:5px 9px;font-size:10px}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}
  .g4{grid-template-columns:1fr 1fr}.g5{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="pw-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;background:#080C12;padding:0 24px;text-align:center">
  <div style="font-size:10px;letter-spacing:5px;color:#D4A843;text-transform:uppercase;opacity:.8">Confidential Access</div>
  <div style="font-size:38px;font-weight:700;color:#F5F7FA;letter-spacing:-1px">Foundational Builders Corp.</div>
  <div style="font-size:13px;color:#7A8A9A">Investor Deck · Private</div>
  <div style="width:48px;height:1px;background:linear-gradient(90deg,transparent,#D4A843,transparent)"></div>
  <input id="pw-input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()" style="padding:14px 20px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;color:#F5F7FA;font-size:15px;width:100%;max-width:280px;outline:none;font-family:inherit;text-align:center;transition:border-color .2s"/>

  <div id="pw-err" style="font-size:12px;color:#E24B4A;display:none">Incorrect password. Try again.</div>
</div>

<div id="app" style="display:none">
  <div class="nav" id="nav"></div>
  <div class="slide" id="slide"></div>
  <div class="footer">
    <button class="fb" id="prev" onclick="go(-1)">← Prev</button>
    <span class="pg" id="pg">1 / 10</span>
    <button class="fb" id="next" onclick="go(1)">Next →</button>

</div>

  <div class="sub">Construction wins fund media. Media generates leads. Leads become contracts. Contracts fund everything.</div></div>

// 7 USE OF FUNDS
()=>`<div style="display:flex;flex-direction:column;gap:16px">
