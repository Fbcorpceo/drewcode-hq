<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #080C12; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
    .deck { background: #080C12; min-height: 100vh; display: flex; flex-direction: column; }
    .nav { display: flex; gap: 2px; padding: 14px 24px; background: rgba(8,12,18,0.97); border-bottom: 0.5px solid rgba(255,255,255,0.07); flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
    .nav-btn { padding: 6px 14px; font-size: 11px; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; letter-spacing: 0.3px; transition: all 0.2s; background: transparent; color: rgba(255,255,255,0.35); }
    .nav-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
    .nav-btn.active { background: rgba(212,168,67,0.15); color: #D4A843; }
    .slide { flex: 1; padding: 40px 48px; display: flex; flex-direction: column; justify-content: center; }
    .footer { display: flex; justify-content: space-between; align-items: center; padding: 14px 48px; border-top: 0.5px solid rgba(255,255,255,0.07); background: rgba(8,12,18,0.97); }
    .foot-btn { padding: 8px 22px; background: transparent; border: 0.5px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }

    .foot-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .card { background: rgba(255,255,255,0.035); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 22px 24px; transition: border-color 0.2s; }
    .card:hover { border-color: rgba(255,255,255,0.14); }
    .tag { font-size: 11px; padding: 4px 11px; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 20px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.03); }
    .award-row { display: flex; gap: 10px; align-items: flex-start; padding: 8px 12px; background: rgba(212,168,67,0.05); border: 0.5px solid rgba(212,168,67,0.15); border-radius: 10px; }
    .check-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 14px; background: rgba(0,0,0,0.3); color: rgba(212,168,67,0.8); font-weight: 500; text-align: left; border-bottom: 0.5px solid rgba(255,255,255,0.08); letter-spacing: 0.8px; font-size: 10.5px; text-transform: uppercase; }
    td { padding: 12px 14px; border-bottom: 0.5px solid rgba(255,255,255,0.05); font-size: 13px; color: #F5F7FA; }

    .metric { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 20px 16px; text-align: center; }
    .bar-track { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin: 10px 0 14px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .g2s { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .frow { display: flex; gap: 12px; }

    .pw-btn { padding: 12px 40px; background: rgba(212,168,67,0.1); border: 0.5px solid rgba(212,168,67,0.4); border-radius: 8px; color: #D4A843; font-size: 13px; cursor: pointer; font-family: inherit; letter-spacing: 1px; }

      .r-cover { font-size: 38px !important; letter-spacing: -1px !important; }

      th { padding: 8px 10px !important; font-size: 9px !important; }
      td { padding: 8px 10px !important; font-size: 11px !important; }

</head>

              <thead><tr>{["#", "Community", "Founder", "Niche", "Members", "MRR (est.)", "ARR (est.)"].map(h => <th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {[["1", "The Skool Games", "Sam Ovens", "Community building / SaaS", "85,000+", "~$850K", "~$10.2M"], ["2", "Hormozi's Acquisition.com", "Alex Hormozi", "Business growth", "70,000+", "~$700K", "~$8.4M"], ["3", "Facilitator Club", "Community builders", "Facilitation / coaching", "40,000+", "~$400K", "~$4.8M"], ["4", "Synthesizer School", "Cody Schneider", "Content & AI creators", "25,000+", "~$250K", "~$3.0M"], ["5", "Copy That!", "Alex Cattoni", "Copywriting / marketing", "20,000+", "~$200K", "~$2.4M"]].map((row, i) => (
                  <tr key={i}>{row.map((cell, j) => <td key={j} style={{ color: j === 5 ? gr : j === 6 ? gold : j === 0 ? tm : tp, fontWeight: j === 5 || j === 6 ? 600 : 400, fontSize: j === 0 ? 11 : 13 }}>{cell}</td>)}</tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="g3 g3m">
            {[{ n: "$10.2M", label: "Top community ARR", sub: "The ceiling is proven", c: gold, glow: gG }, { n: "$2.4M+", label: "Avg. ARR top 5", sub: "Consistent across niches", c: ac, glow: gB }, { n: "$500K", label: "DrewCodeHQ target MRR", sub: "Conservative vs. comps", c: gr, glow: gGr }].map(c => (
              <div key={c.n} className="metric" style={{ boxShadow: c.glow }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: c.c, letterSpacing: "-1px" }}>{c.n}</div>
                <div style={{ fontSize: 12, color: tp, marginTop: 6, fontWeight: 500 }}>{c.label}</div>
                <div style={{ fontSize: 11, color: tm, marginTop: 3 }}>{c.sub}</div>
              </div>
            ))}
          </div>
          <div style={{ background: "rgba(52,199,123,0.05)", border: "0.5px solid rgba(52,199,123,0.18)", borderRadius: 12, padding: "12px 20px", fontSize: 12.5, color: "rgba(52,199,123,0.85)" }}>
            <strong style={{ color: gr }}>Takeaway:</strong> These are real, documented communities on the same platform. DrewCodeHQ's $500K/mo target MRR is achievable — it's roughly what the #5 community does annually. The model works.
          </div>
        </div>
      );
    }

    function Slide9() {
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 24, textAlign: "center" }}>
          <H label="The Ask" title="Simple. Structured. Time-bound." center={true} />
          <div className="g3" style={{ width: "100%" }}>
            {[{ n: "$60,000", label: "Total investment", c: gold, glow: gG }, { n: "2–3×", label: "Target return", c: ac, glow: gB }, { n: "18 mo", label: "Target timeline", c: gr, glow: gGr }].map(c => (
              <div key={c.n} className="card" style={{ padding: "24px 16px", boxShadow: c.glow }}>
                <div style={{ fontSize: 36, fontWeight: 700, color: c.c, letterSpacing: "-1.5px" }}>{c.n}</div>
                <div style={{ fontSize: 12, color: tm, marginTop: 8 }}>{c.label}</div>
              </div>
            ))}
          </div>
          <div className="card" style={{ maxWidth: 540, width: "100%", textAlign: "left", boxShadow: gG }}>
            <div style={{ fontSize: 10, color: gold, fontWeight: 600, textTransform: "uppercase", letterSpacing: 2, marginBottom: 14 }}>What we're asking Dave to fund</div>
            {[["Content production with Adam Cyril", "Professional-grade video that converts"], ["Ops team execution", "Arno, Nicholas, Sakib & Dawson fully deployed"], ["Paid growth acceleration", "Shortened timeline to 10K member milestone"], ["Automation stack build-out", "Reduces ongoing cost per acquisition at scale"]].map(([t, s]) => (
              <div key={t} className="check-row">
                <div style={{ width: 20, height: 20, borderRadius: "50%", background: "rgba(52,199,123,0.12)", border: "0.5px solid rgba(52,199,123,0.3)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>
                  <span style={{ color: gr, fontSize: 11, fontWeight: 700 }}>✓</span>
                </div>
                <div>
                  <div style={{ fontSize: 13, color: tp, fontWeight: 500 }}>{t}</div>
                  <div style={{ fontSize: 12, color: tm, marginTop: 2 }}>{s}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 13, color: tm, maxWidth: 440, lineHeight: 1.8, padding: "0 8px" }}>
            The team is assembled. The model is validated. The content director is ready. <span style={{ color: tp, fontWeight: 500 }}>Time to execute.</span>
          </div>
        </div>
      );
    }

    const slideComponents = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6, Slide7, Slide8, Slide9];
    const slideLabels = ["Cover","The Opportunity","Business Model","Content Strategy","The Team","Use of Funds","Return Model","Skool Benchmarks","The Ask"];

    function Deck() {
      const [cur, setCur] = useState(0);
      const SlideComp = slideComponents[cur];
      return (
        <div className="deck">
          <div className="nav">
            {slideLabels.map((label, i) => (
              <button key={i} className={"nav-btn" + (i === cur ? " active" : "")} onClick={() => setCur(i)}>{i + 1}. {label}</button>
            ))}
          </div>
          <div className="slide"><SlideComp /></div>
          <div className="footer">
            <button className="foot-btn" onClick={() => setCur(Math.max(0, cur - 1))} disabled={cur === 0}>← Prev</button>
            <span style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", letterSpacing: 1 }}>{cur + 1} / {slideLabels.length}</span>
            <button className="foot-btn" onClick={() => setCur(Math.min(slideLabels.length - 1, cur + 1))} disabled={cur === slideLabels.length - 1}>Next →</button>
          </div>
        </div>
      );
    }

    function App() {
      const [unlocked, setUnlocked] = useState(false);
      const [val, setVal] = useState("");
      const [err, setErr] = useState(false);

      const check = () => {
        if (val === PASSWORD) {
          setUnlocked(true);
        } else {
          setErr(true);
          setTimeout(() => setErr(false), 1500);
        }
      };

      if (unlocked) return <Deck />;

      return (
        <div className="pw-wrap">
          <div style={{ fontSize: 10, letterSpacing: 5, color: gold, textTransform: "uppercase", opacity: 0.8 }}>Confidential Access</div>
          <div style={{ fontSize: 38, fontWeight: 700, color: tp, letterSpacing: "-1px", textAlign: "center" }}>DrewCodeHQ</div>
          <div style={{ fontSize: 13, color: tm }}>Investor Deck · Private</div>
          <div style={{ width: 48, height: 1, background: "linear-gradient(90deg,transparent,#D4A843,transparent)" }} />
          <input
            className="pw-input"
            type="password"
            placeholder="Enter password"
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={e => e.key === "Enter" && check()}
            style={{ border: "0.5px solid " + (err ? "#E24B4A" : "rgba(255,255,255,0.15)") }}
          />
          <button className="pw-btn" onClick={check}>{err ? "Incorrect ✕" : "Enter →"}</button>
          {err && <div style={{ fontSize: 12, color: "#E24B4A" }}>Incorrect password. Try again.</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
